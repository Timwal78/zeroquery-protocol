name: Sovereign Data Enforcement

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  sovereign-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Sovereign Data Scanner
        run: |
          chmod +x scripts/check-sovereign-data.sh
          ./scripts/check-sovereign-data.sh
